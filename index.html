<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix Clone</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <nav>
      <div class="logo">
        <img src="resources/icons/netflix-logo.svg" alt="">
      </div>

      <div>
        <button class="sign-in-button">Sign In</button>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero-section">
      
      <img src="resources/images/hero-img.jpg" alt="" class="hero-image">

      <div class="overlay"></div>

      <div class="hero-description-section">

          <h1 class="hero-title">Unlimited movies, TV shows, and more</h1>
          <p class="hero-price">Starts at USD 2.99. Cancel anytime.</p>
          <p class="hero-subtitle">Ready to watch? Enter your email to create or restart your membership.</p>

          <div class="hero-btns">

            <input type="email" placeholder="Email address" name="email">

            <button class="get-started-btn">
                Get Started
            </button>

          </div>
      </div>
 
    </section>
  </main>

  <footer>

  </footer>
  
</body>
</html>
